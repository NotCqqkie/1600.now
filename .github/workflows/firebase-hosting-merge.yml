name: Deploy to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  configuration_guard:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify Workload Identity configuration
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ vars.FIREBASE_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOY_SERVICE_ACCOUNT: ${{ vars.FIREBASE_DEPLOY_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$WORKLOAD_IDENTITY_PROVIDER" ]; then
            echo "::error::FIREBASE_WORKLOAD_IDENTITY_PROVIDER is not configured"
            exit 1
          fi
          if [ -z "$DEPLOY_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_DEPLOY_SERVICE_ACCOUNT is not configured"
            exit 1
          fi

  build_and_validate:
    if: github.ref == 'refs/heads/main'
    needs: configuration_guard
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Install Firebase CLI
        run: |
          npm install --global firebase-tools@15.16.0 --ignore-scripts --no-audit --no-fund
          test "$(firebase --version)" = "15.16.0"

      - name: Test Firestore rules
        run: npm run test:rules

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build production site
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_AUTH_DOMAIN_LOCAL: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_LOCAL }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY }}
          VITE_DESMOS_API_KEY: ${{ vars.VITE_DESMOS_API_KEY }}

      - name: Upload deployment bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: firebase-deploy-${{ github.sha }}
          path: |
            dist
            firebase.json
            firestore.rules
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  deploy_oidc:
    if: github.ref == 'refs/heads/main'
    needs: build_and_validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Download deployment bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: firebase-deploy-${{ github.sha }}
          path: .

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Verify deployment bundle
        run: |
          test -s dist/index.html
          test -s firebase.json
          test -s firestore.rules
          node - <<'NODE'
          const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync("firebase.json", "utf8"));
          const visit = (value) => {
            if (!value || typeof value !== "object") return;
            for (const [key, child] of Object.entries(value)) {
              if (key === "predeploy" || key === "postdeploy") {
                throw new Error(`Deployment hooks are not allowed: ${key}`);
              }
              visit(child);
            }
          };
          visit(config);
          if (config.hosting?.public !== "dist") throw new Error("Hosting public directory must be dist");
          if (config.firestore?.rules !== "firestore.rules") throw new Error("Unexpected Firestore rules path");
          NODE

      - name: Install Firebase CLI
        run: |
          npm install --global firebase-tools@15.16.0 --ignore-scripts --no-audit --no-fund
          test "$(firebase --version)" = "15.16.0"

      - name: Authenticate with Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          project_id: now-483609
          workload_identity_provider: ${{ vars.FIREBASE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.FIREBASE_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy Hosting and Firestore rules
        run: firebase deploy --only hosting,firestore:rules --project now-483609 --non-interactive
