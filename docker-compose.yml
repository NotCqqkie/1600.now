services:
  app:
    build:
      context: .
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:?Set VITE_FIREBASE_API_KEY in .env}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:?Set VITE_FIREBASE_AUTH_DOMAIN in .env}
        VITE_FIREBASE_AUTH_LINK_DOMAIN: ${VITE_FIREBASE_AUTH_LINK_DOMAIN:-}
        VITE_FIREBASE_AUTH_DOMAIN_LOCAL: ${VITE_FIREBASE_AUTH_DOMAIN_LOCAL:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:?Set VITE_FIREBASE_PROJECT_ID in .env}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:?Set VITE_FIREBASE_APP_ID in .env}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID:?Set VITE_FIREBASE_MEASUREMENT_ID in .env}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:?Set VITE_RECAPTCHA_SITE_KEY in .env}
        VITE_DESMOS_API_KEY: ${VITE_DESMOS_API_KEY:-}
        VITE_USE_FIREBASE_EMULATORS: "false"
    container_name: 1600now
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    restart: unless-stopped
