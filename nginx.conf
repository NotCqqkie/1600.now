server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied to every response
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # 'unsafe-inline' in script-src is required by the inline gtag init and
    # theme bootstrap in index.html — kept consistent with firebase.json.
    # TODO: replace with per-script hashes/nonces and drop 'unsafe-inline'.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.desmos.com https://apis.google.com https://www.gstatic.com https://www.googletagmanager.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.google-analytics.com https://*.analytics.google.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://www.desmos.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Firebase Auth helper endpoints for custom authDomain (e.g. 1600.now).
    # This proxies /__/auth/* to your project's firebaseapp domain so Google
    # sign-in popup/redirect flow can complete.
    location /__/auth/ {
        proxy_pass https://now-483609.firebaseapp.com/__/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host now-483609.firebaseapp.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite cookie Domain attribute from firebaseapp.com to this host
        # so the browser actually keeps the auth session cookies.
        proxy_cookie_domain now-483609.firebaseapp.com $host;
        proxy_cookie_path / /;
        proxy_redirect off;

        # Override the global X-Frame-Options DENY and CSP frame-ancestors
        # 'none' for this path. Firebase's auth handler renders an iframe at
        # /__/auth/iframe that must be embeddable by the same-origin parent
        # page; with the global headers applied, Firefox/Chrome block the
        # iframe (about:neterror cspBlocked) and the OAuth result never lands.
        # Setting any add_header here drops the inherited ones (nginx rule),
        # which is intentional — re-add only what is safe for these paths.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~ ^/(bank|hard|modules|practice-tests|login|signup|verify-email|profile|analysis|test-results|my-practice-sets|vocab|browse|score-calculator|sat-vocabulary|sat-score|sat-skill|blog|sat-faq|privacy|terms|sat-to-act-converter|sat-percentile-calculator|psat-to-sat-predictor|sat-study-plan-generator|what-sat-score-do-i-need|sat-test-countdown|in|ae|college|admin)(/|$) {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # nginx replaces parent add_header directives when any add_header is set
        # here — re-add the nosniff guard so cached JS/CSS can't be MIME-sniffed.
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* ^/(optimized|images)/.*\.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* ^/explanations/.*\.json$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
