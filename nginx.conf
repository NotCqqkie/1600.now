server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied to every response
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.workers.dev https://*.google-analytics.com https://*.analytics.google.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://www.desmos.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Firebase Auth helper endpoints for custom authDomain (e.g. 1600.now).
    # This proxies /__/auth/* to your project's firebaseapp domain so Google
    # sign-in popup/redirect flow can complete.
    location /__/auth/ {
        proxy_pass https://now-483609.firebaseapp.com/__/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host now-483609.firebaseapp.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # nginx replaces parent add_header directives when any add_header is set
        # here — re-add the nosniff guard so cached JS/CSS can't be MIME-sniffed.
        add_header X-Content-Type-Options "nosniff" always;
    }
}
