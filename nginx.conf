server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Firebase Auth helper endpoints for custom authDomain (e.g. 1600.now).
    # This proxies /__/auth/* to your project's firebaseapp domain so Google
    # sign-in popup/redirect flow can complete.
    location /__/auth/ {
        proxy_pass https://now-d3d27.firebaseapp.com/__/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host now-d3d27.firebaseapp.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
